<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 最終型態 - 茂盛的三葉草 -->
  <path d="M 50 85 Q 48 60 50 45" stroke="#558b2f" stroke-width="6" fill="none"/>
  <!-- 三片大葉子 -->
  <ellipse cx="50" cy="28" rx="10" ry="12" fill="#9ccc65"/>
  <ellipse cx="30" cy="45" rx="9" ry="12" fill="#9ccc65" transform="rotate(-120 30 45)"/>
  <ellipse cx="70" cy="45" rx="9" ry="12" fill="#9ccc65" transform="rotate(120 70 45)"/>
  <!-- 額外的小葉 -->
  <ellipse cx="45" cy="20" rx="6" ry="8" fill="#8bc34a" opacity="0.8"/>
  <ellipse cx="55" cy="20" rx="6" ry="8" fill="#8bc34a" opacity="0.8"/>
  <!-- 莖 -->
  <line x1="50" y1="35" x2="50" y2="10" stroke="#558b2f" stroke-width="3"/>
  <line x1="50" y1="38" x2="30" y2="45" stroke="#7cb342" stroke-width="2"/>
  <line x1="50" y1="38" x2="70" y2="45" stroke="#7cb342" stroke-width="2"/>
  <ellipse cx="50" cy="92" rx="20" ry="6" fill="#8d6e63" opacity="0.3"/>
</svg>